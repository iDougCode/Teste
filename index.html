<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
#ar-button{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
padding:20px 40px;
font-size:22px;
background:#000;
color:#fff;
border-radius:12px;
border:none;
}
</style>
</head>

<body style="margin:0">

<model-viewer
id="model"
src="object.usdz"
ios-src="object.usdz"
ar
ar-modes="scene-viewer quick-look webxr"
camera-controls
style="width:100%; height:100vh;">
</model-viewer>

<button id="ar-button" slot="ar-button">
Ver em AR
</button>

</body>
</html>
